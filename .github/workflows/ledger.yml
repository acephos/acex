name: ledger

on:
  pull_request:
  push:

jobs:
  checkpoint-ledger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate checkpoint ledger
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="origin/${{ github.base_ref }}"
          else
            base="${{ github.event.before }}"
          fi
          python scripts/check-ledger-append-only.py "$base"
